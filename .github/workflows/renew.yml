name: Renew Library Books

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    environment: LIBRARY_BORROWBOX_RENEWAL_AUTOMATION
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright python-dotenv
          playwright install chromium
          playwright install-deps chromium

      - name: Debug env vars (lengths only, no values)
        env:
          USER1_USERNAME: ${{ secrets.USER1_USERNAME }}
          USER1_PASSWORD: ${{ secrets.USER1_PASSWORD }}
          USER2_USERNAME: ${{ secrets.USER2_USERNAME }}
          USER2_PASSWORD: ${{ secrets.USER2_PASSWORD }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
        run: |
          echo "USER1_USERNAME length: ${#USER1_USERNAME}"
          echo "USER1_PASSWORD length: ${#USER1_PASSWORD}"
          echo "USER2_USERNAME length: ${#USER2_USERNAME}"
          echo "USER2_PASSWORD length: ${#USER2_PASSWORD}"
          echo "EMAIL_SENDER length: ${#EMAIL_SENDER}"
          echo "EMAIL_PASSWORD length: ${#EMAIL_PASSWORD}"
          echo "EMAIL_RECIPIENT length: ${#EMAIL_RECIPIENT}"

      - name: Run renewal script (continue on error for debugging)
        id: run_script
        continue-on-error: true
        env:
          USER1_USERNAME: ${{ secrets.USER1_USERNAME }}
          USER1_PASSWORD: ${{ secrets.USER1_PASSWORD }}
          USER2_USERNAME: ${{ secrets.USER2_USERNAME }}
          USER2_PASSWORD: ${{ secrets.USER2_PASSWORD }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
        run: python -u main.py

      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: |
            *.png
            *.html
          if-no-files-found: ignore
